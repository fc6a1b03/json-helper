<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Prism：白光射入棱镜，折射出彩虹光谱 -->
  <!-- 入射白光 -->
  <line x1="2.5" y1="25.5" x2="14.6" y2="20.2" stroke="#EAEAEA" stroke-width="2.4" stroke-linecap="round"/>
  <!-- 棱镜本体 -->
  <path d="M20 6.5 L31.5 30.5 L8.5 30.5 Z" fill="rgba(234,234,234,0.12)" stroke="#EAEAEA" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- 折射光谱（红→蓝 自上而散） -->
  <line x1="25.4" y1="19.8" x2="37.5" y2="13.5" stroke="#FF5252" stroke-width="2" stroke-linecap="round"/>
  <line x1="25.4" y1="20.8" x2="37.5" y2="17.5" stroke="#FF9800" stroke-width="2" stroke-linecap="round"/>
  <line x1="25.4" y1="21.8" x2="37.5" y2="21.5" stroke="#FFEB3B" stroke-width="2" stroke-linecap="round"/>
  <line x1="25.4" y1="22.8" x2="37.5" y2="25.5" stroke="#4CAF50" stroke-width="2" stroke-linecap="round"/>
  <line x1="25.4" y1="23.8" x2="37.5" y2="29.5" stroke="#2196F3" stroke-width="2" stroke-linecap="round"/>
</svg>
