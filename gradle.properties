# ============================================================
# Gradle 构建环境配置（依据 Gradle 9.6.1 官方属性表整理）
# https://docs.gradle.org/9.6.1/userguide/build_environment.html
# 仅保留非默认值与项目必需项；默认值（如 daemon、vfs.watch）不再显式声明
# ============================================================

# ---- 构建性能 ----
# 构建缓存：复用历史任务输出，加速重复构建（官方默认 false）
org.gradle.caching=true
# 并行构建：多项目并行执行（官方默认 false；worker 上限默认取 CPU 核数，不再硬编码）
org.gradle.parallel=true

# ---- 守护进程 JVM ----
# 守护进程内存与编码参数
# 注意：不得再配置 -Djava.security.manager=allow（JDK 24+ 会直接拒绝启动 JVM）
org.gradle.jvmargs=-Xms1g -Xmx5g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Duser.timezone=GMT+8 -Dfile.encoding=UTF-8

# ---- Java 工具链解析 ----
# 工具链候选来源：环境变量（本机安装路径等机器相关配置放用户级 GRADLE_USER_HOME/gradle.properties，不入库，避免 CI 失效）
org.gradle.java.installations.fromEnv=JAVA_HOME,Java_Home

# ---- IntelliJ Platform Gradle Plugin ----
# 关闭 JetBrains Cache Redirector，直连官方仓库（国内网络更稳定）
org.jetbrains.intellij.platform.useCacheRedirector=false

# ---- HTTP 代理（网络受限时取消注释）----
#systemProp.http.proxyHost=127.0.0.1
#systemProp.http.proxyPort=7890
#systemProp.https.proxyHost=127.0.0.1
#systemProp.https.proxyPort=7890
